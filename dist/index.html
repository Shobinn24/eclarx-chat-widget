<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FirmChat — AI Chatbot Demo</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 60px 24px;
        background: #f0f4f8;
        color: #2d3748;
      }
      .demo-page {
        max-width: 700px;
        margin: 0 auto;
        text-align: center;
      }
      h1 { font-size: 2rem; margin-bottom: 8px; }
      p { color: #718096; font-size: 1.1rem; margin-bottom: 32px; }
      .demo-label {
        position: fixed;
        bottom: 90px;
        right: 24px;
        background: #1a365d;
        color: #fff;
        padding: 6px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        z-index: 99997;
        animation: bounce-label 2s infinite;
      }
      @keyframes bounce-label {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
    </style>
    <script type="module" crossorigin src="/chatbot.js"></script>
    
  </head>
  <body>
    <div class="demo-page">
      <h1>FirmChat</h1>
      <p>Try the demo — click the chat button in the bottom right corner.</p>
    </div>
    <div class="demo-label">Demo — Try It Now ↓</div>
    <!-- The widget loads here -->
  </body>
</html>
